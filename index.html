<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Q Learning</title>
  <style>
    :root {
      --ink: #132238;
      --muted: #5d6b7a;
      --blue: #0b5d8e;
      --blue-dark: #084c74;
      --line: #d8e0e8;
      --paper: #f7fafc;
      --panel: #ffffff;
      --shadow: 0 16px 36px rgba(19, 34, 56, 0.1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef7fb 0, rgba(238, 247, 251, 0) 360px),
        var(--paper);
    }

    main {
      width: min(720px, calc(100% - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 48px);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-size: clamp(42px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 18px auto 0;
      max-width: 540px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 30px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 6px;
      border: 1px solid var(--blue);
      background: var(--blue);
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
      font-size: 18px;
      transition: background 0.15s, transform 0.12s, border-color 0.15s;
    }

    a:hover {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
    }

    a:active {
      transform: translateY(1px);
    }

    a.secondary {
      background: #ffffff;
      color: var(--blue);
    }

    a.secondary:hover {
      background: #e6f3fb;
    }

    @media (max-width: 560px) {
      .actions {
        grid-template-columns: 1fr;
      }

      main {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Q Learning</h1>
    <p>Pilih halaman soal untuk mahasiswa atau halaman jawaban untuk kunci pembahasan.</p>
    <div class="actions">
      <a href="q-learning-playground.html">Soal</a>
      <a class="secondary" href="q-learning-playground-jawaban.html">Jawaban</a>
    </div>
  </main>
</body>
</html>
